      <h1>隐私政策</h1>
      <p>本工具不要求注册账号，也不会主动收集玩家姓名、邮箱或游戏账号。配装条件会保存在当前页面地址中，用于分享与复现搜索。</p>
      <p>网站上线接入 Google AdSense 后，Google 可能使用 Cookie 或类似技术展示广告、衡量广告效果并防止欺诈。你可以在 Google 的广告设置页面管理个性化广告偏好。</p>
      <p>如后续接入访问统计，应优先使用匿名化配置，并在本页更新说明。</p>
    </main>
